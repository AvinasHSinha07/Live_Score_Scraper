services:
  - type: web
    name: live-score-scraper-client
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: PLAYWRIGHT_BROWSERS_PATH=/opt/render/project/src/.playwright-browsers python -m playwright install chromium && gunicorn web_portal.web_app:app --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 300
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/src/.playwright-browsers
      - key: SCRAPER_MAX_WORKERS
        value: 2
      - key: SCRAPER_MAX_MATCHES
        value: 4
      - key: SCRAPER_REQUEST_TIMEOUT_SECONDS
        value: 150
      - key: SCRAPER_CACHE_TTL_SECONDS
        value: 900
